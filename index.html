<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modalà — Great Things Are Coming</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f5ede8;
      --burgundy:    #7d2843;
      --mauve:       #c48a8f;
      --terracotta:  #c4856a;
      --sand:        #d4bfb0;
      --text:        #1a1414;
      --muted:       rgba(26,20,20,0.45);
      --white:       #ffffff;
      --radius:      16px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Decorative blobs — mirroring the tilted organic shapes in the Figma prototype ── */
    .shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .shape {
      position: absolute;
      border-radius: 38% 62% 55% 45% / 42% 48% 52% 58%;
    }
    .shape-1 {
      width: 520px; height: 520px;
      background: var(--burgundy);
      top: -80px; left: -120px;
      transform: rotate(-18deg);
      opacity: 0.88;
      border-radius: 40% 60% 50% 50% / 50% 40% 60% 50%;
      animation: sway1 20s ease-in-out infinite alternate;
    }
    .shape-2 {
      width: 380px; height: 420px;
      background: var(--mauve);
      top: 80px; right: -60px;
      transform: rotate(12deg);
      opacity: 0.70;
      border-radius: 50% 50% 40% 60% / 60% 40% 60% 40%;
      animation: sway2 25s ease-in-out infinite alternate;
    }
    .shape-3 {
      width: 460px; height: 380px;
      background: var(--sand);
      bottom: -60px; right: -80px;
      transform: rotate(-8deg);
      opacity: 0.80;
      border-radius: 55% 45% 50% 50% / 45% 55% 45% 55%;
      animation: sway3 22s ease-in-out infinite alternate;
    }
    .shape-4 {
      width: 300px; height: 300px;
      background: var(--terracotta);
      bottom: 80px; left: -60px;
      transform: rotate(20deg);
      opacity: 0.55;
      border-radius: 50%;
      animation: sway4 28s ease-in-out infinite alternate;
    }

    @keyframes sway1 { to { transform: rotate(-14deg) translate(20px, 16px); } }
    @keyframes sway2 { to { transform: rotate(16deg)  translate(-16px, 20px); } }
    @keyframes sway3 { to { transform: rotate(-4deg)  translate(-12px, -18px); } }
    @keyframes sway4 { to { transform: rotate(24deg)  translate(18px, -14px); } }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
    }

    /* ── Logo / wordmark ── */
    .logo {
      font-size: clamp(2.8rem, 9vw, 5.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }

    .tagline-small {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
    }

    /* ── Card ── */
    .card {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 28px;
      padding: clamp(36px, 6vw, 64px) clamp(28px, 6vw, 72px);
      max-width: 600px;
      width: 100%;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 2px 0 rgba(255,255,255,0.8) inset,
        0 20px 60px rgba(125, 40, 67, 0.12),
        0 4px 16px rgba(0,0,0,0.06);
      text-align: center;
    }

    /* ── ✦ sparkle / icon ── */
    .sparkle {
      font-size: 2rem;
      color: var(--burgundy);
      margin-bottom: 24px;
      display: block;
      opacity: 0.85;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    h1 span { color: var(--burgundy); }

    .description {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 38px;
    }

    /* ── Newsletter form ── */
    .form-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .email-input {
      flex: 1;
      min-width: 180px;
      background: rgba(245,237,232,0.7);
      border: 1.5px solid rgba(125,40,67,0.15);
      border-radius: var(--radius);
      padding: 14px 18px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .email-input::placeholder { color: var(--muted); }
    .email-input:focus {
      border-color: rgba(125,40,67,0.5);
      box-shadow: 0 0 0 3px rgba(125,40,67,0.08);
      background: rgba(255,255,255,0.9);
    }

    .subscribe-btn {
      background: var(--text);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      padding: 14px 26px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(26,20,20,0.2);
    }
    .subscribe-btn:hover {
      background: var(--burgundy);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(125,40,67,0.3);
    }
    .subscribe-btn:active { transform: translateY(0); }

    /* ── Success state ── */
    .success-msg {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--burgundy);
      font-size: 0.95rem;
      margin-top: 18px;
      animation: fadeIn 0.4s ease;
    }
    .success-msg.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Divider with label ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 32px 0 0;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(125,40,67,0.12);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 24px;
      letter-spacing: 0.04em;
    }

    /* ── Honeypot (hidden from humans) ── */
    .hp-field {
      position: absolute;
      left: -9999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    /* ── Error message ── */
    .error-msg {
      display: none;
      color: var(--terracotta);
      font-size: 0.85rem;
      margin-top: 14px;
    }
    .error-msg.show { display: block; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      .subscribe-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Organic decorative shapes from the Figma prototype -->
  <div class="shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <main>
    <div class="logo">Modalà</div>
    <p class="tagline-small">Your personal outfit club</p>

    <div class="card">
      <span class="sparkle" aria-hidden="true">✦</span>

      <h1>Welcome to <span>Modalà</span> —<br/>great things are coming!</h1>
      <p class="description">
        Real-time outfit votes from your fashion circle.
        Discover, share, and shop as a community — anytime, anywhere.
      </p>

      <label class="form-label" for="email-input">Don't miss out on the launch</label>
      <div class="input-row">
        <input
          id="email-input"
          class="email-input"
          type="email"
          placeholder="your@email.com"
          autocomplete="email"
        />
        <button class="subscribe-btn" onclick="handleSubscribe()">Keep in touch →</button>
      </div>

      <!-- Honeypot: hidden from humans, bots tend to fill every field -->
      <div class="hp-field" aria-hidden="true">
        <label for="website">Website</label>
        <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
      </div>
      <div class="success-msg" id="success-msg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6 9 17l-5-5"/>
        </svg>
        You're on the list — we'll be in touch soon!
      </div>
      <div class="error-msg" id="error-msg"></div>

      <div class="divider">The Club is coming</div>
    </div>
  </main>

  <footer>© 2026 Modalà · All rights reserved</footer>

  <script>
    // ── Paste your Google Apps Script Web App URL here ──
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPaSxTW28FHszLNuXkc8AX9YW5K9OGikbhzWXopuQOQrFzLkbFs0rEEG66naqzrQdw/exec';

    // Spam-protection knobs
    const MIN_FILL_TIME_MS = 2500;          // bots usually submit faster than this
    const COOLDOWN_MS = 60 * 1000;           // one signup per minute per browser
    const COOLDOWN_KEY = 'modala_last_submit';
    const pageLoadedAt = Date.now();

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function flagInput(input) {
      input.style.borderColor = 'rgba(196,133,106,0.8)';
      input.style.boxShadow = '0 0 0 3px rgba(196,133,106,0.12)';
      input.focus();
      setTimeout(() => {
        input.style.borderColor = '';
        input.style.boxShadow = '';
      }, 2000);
    }

    async function handleSubscribe() {
      const input = document.getElementById('email-input');
      const honeypot = document.getElementById('website');
      const successMsg = document.getElementById('success-msg');
      const btn = document.querySelector('.subscribe-btn');

      // 1. Honeypot — silently drop bot submissions (fake success so they don't retry)
      if (honeypot.value.trim() !== '') {
        btn.textContent = '✓ Done!';
        btn.disabled = true;
        input.disabled = true;
        successMsg.classList.add('show');
        return;
      }

      // 2. Time-on-page — humans take more than ~2.5s to read + type
      const elapsed = Date.now() - pageLoadedAt;
      if (elapsed < MIN_FILL_TIME_MS) {
        showError('Please take a moment before submitting.');
        return;
      }

      // 3. Cooldown — block rapid resubmits from the same browser
      const last = parseInt(localStorage.getItem(COOLDOWN_KEY) || '0', 10);
      if (last && Date.now() - last < COOLDOWN_MS) {
        showError("You've already signed up — we'll be in touch!");
        return;
      }

      // 4. Email format
      if (!input.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value)) {
        flagInput(input);
        return;
      }

      btn.textContent = 'Sending…';
      btn.disabled = true;
      input.disabled = true;

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: input.value,
            timestamp: new Date().toISOString(),
            // Spam signals for server-side validation
            website: honeypot.value,        // honeypot — should always be empty
            elapsedMs: elapsed,             // time between page load and submit
            userAgent: navigator.userAgent
          })
        });
      } catch (_) { /* no-cors fetch always resolves, but just in case */ }

      localStorage.setItem(COOLDOWN_KEY, String(Date.now()));

      btn.textContent = '✓ Done!';
      btn.style.background = 'var(--burgundy)';
      successMsg.classList.add('show');
    }

    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubscribe();
    });
  </script>
</body>
</html>
